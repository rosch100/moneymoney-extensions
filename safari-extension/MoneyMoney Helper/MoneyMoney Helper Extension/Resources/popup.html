<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>MoneyMoney Helper</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 12px;
      width: 280px;
      font: 13px/1.4 system-ui, sans-serif;
      color: #1a1a1a;
      background: #f7f7f7;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 600;
    }
    #status {
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 6px;
      background: #e8e8e8;
      font-size: 12px;
    }
    #status.ok { background: #d7f0dc; color: #14532d; }
    #status.warn { background: #fff0d6; color: #7c4a03; }
    #status.error { background: #fde2e2; color: #7f1d1d; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #1a5f2a;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .hint {
      margin-top: 8px;
      font-size: 11px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1 id="title">MoneyMoney</h1>
  <div id="status">Lade …</div>
  <button id="copy" type="button" disabled>Cookies kopieren</button>
  <p class="hint" id="hint"></p>
  <script type="module" src="popup.js"></script>
</body>
</html>
